<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Web Moderno - Clone Smarters</title>
    
    <!-- Tailwind CSS (Via CDN para teste rápido) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HLS.js Player -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Scrollbar para visual moderno */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .glass-panel {
            background: rgba(31, 41, 51, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans h-screen overflow-hidden">

    <div class="flex h-full">
        
        <!-- SIDEBAR (Lista de Canais / EPG) -->
        <aside class="w-1/3 min-w-[350px] max-w-[450px] flex flex-col border-r border-gray-700 bg-gray-800">
            
            <!-- Header do App -->
            <div class="p-6 border-b border-gray-700 flex items-center justify-between">
                <h1 class="text-xl font-bold text-blue-400 tracking-wider">STREAM<span class="text-white">PRO</span></h1>
                <button id="settingsBtn" class="p-2 hover:bg-gray-700 rounded-full transition"><i data-lucide="settings"></i></button>
            </div>

            <!-- Barra de Busca -->
            <div class="p-4">
                <input type="text" placeholder="Buscar canal..." class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>

            <!-- Lista de Canais (Scrollável) -->
            <div id="channelList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Os canais serão inseridos via JS aqui -->
            </div>

            <!-- Footer / Status -->
            <div class="p-4 border-t border-gray-700 bg-gray-800 text-xs text-gray-400 flex justify-between items-center">
                <span id="statusText">Aguardando conexão...</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online</span>
            </div>
        </aside>

        <!-- PLAYER (Área Principal) -->
        <main class="flex-1 flex flex-col relative">
            
            <!-- Player Container -->
            <div id="player-container" class="w-full h-full bg-black flex items-center justify-center">
                <video id="video" class="w-full h-full object-contain shadow-lg"></video>
                
                <!-- Overlay de Info do Canal (Sobreposto ao vídeo) -->
                <div id="channelInfoOverlay" class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/90 to-transparent transition-opacity duration-300">
                    <h2 id="currentChannelName" class="text-2xl font-bold text-white drop-shadow-md">Selecione um Canal</h2>
                    <p id="currentCategory" class="text-blue-400 uppercase tracking-widest text-sm mt-1">Categoria: Geral</p>
                </div>

                 <!-- Controles do Player (Customizados) -->
                 <div class="absolute bottom-6 left-6 right-6 glass-panel rounded-xl p-3 flex items-center gap-4 shadow-lg border border-gray-700">
                    <button id="playPauseBtn" class="text-white hover:text-blue-400 transition"><i data-lucide="play"></i></button>
                    <div class="flex-1 h-6 bg-gray-700 rounded-full overflow-hidden relative group cursor-pointer">
                        <!-- Barra de progresso -->
                        <div id="progressBar" class="absolute top-0 left-0 h-full bg-blue-500 w-0 transition-all duration-100"></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Lógica da Aplicação -->
    <script>
        // 1. Dados Simulados (Em produção viriam de um Backend/API)
        const channels = [
            { name: "Globo", category: "Geral", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }, // Exemplo HLS
            { name: "SBT", category: "Entretenimento", url: "https://demo.unified-streaming.com/kms/demo-datasets/assets/BigBuckBunny_720p_1mb.mp4" }, // Exemplo MP4/HLS
            { name: "Record", category: "Geral", url: "" } 
        ];

        const video = document.getElementById('video');
        const channelList = document.getElementById('channelList');
        const currentChannelName = document.getElementById('currentChannelName');
        const currentCategory = document.getElementById('currentCategory');
        const statusText = document.getElementById('statusText');
        const playPauseBtn = document.getElementById('playPauseBtn');
        
        // Inicializar ícones Lucide
        lucide.createIcons();

        // 2. Renderizar Lista de Canais
        function renderChannels() {
            channelList.innerHTML = '';
            
            channels.forEach((channel, index) => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg cursor-pointer transition-all duration-200 flex items-center gap-4 hover:bg-gray-700 ${index === 0 ? 'bg-blue-900/30 border-l-4 border-blue-500' : ''}`;
                
                // Ícone baseado na categoria (simplificado)
                const icon = channel.category.includes('Geral') ? 'tv' : 'film';

                div.innerHTML = `
                    <div class="w-12 h-8 bg-gray-700 rounded flex items-center justify-center text-xs font-bold text-white">
                        ${channel.name.substring(0, 3)}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h3 class="font-semibold truncate">${channel.name}</h3>
                        <p class="text-xs text-gray-400 uppercase">${channel.category}</p>
                    </div>
                `;

                div.onclick = () => loadChannel(channel);
                channelList.appendChild(div);
            });
        }

        // 3. Carregar Canal e Player HLS
        function loadChannel(channel) {
            if (!channel.url || !channel.url.trim()) {
                statusText.innerText = "URL do stream vazia";
                return;
            }

            // Atualizar UI
            currentChannelName.innerText = channel.name;
            currentCategory.innerText = `Categoria: ${channel.category}`;
            
            // Efeito visual de carregamento
            video.style.opacity = 0.5;
            statusText.innerText = "Carregando stream...";

            setTimeout(() => {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(channel.url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(e => console.log("Autoplay bloqueado pelo navegador"));
                        statusText.innerText = "Stream reproduzindo";
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Suporte nativo (Safari)
                    video.src = channel.url;
                    video.addEventListener('loadedmetadata', function() {
                         video.play();
                         statusText.innerText = "Stream reproduzindo";
                    });
                }

                video.style.opacity = 1;
            }, 500); // Pequeno delay para suavizar a troca
        }

        // 4. Controles Básicos
        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playPauseBtn.innerHTML = '<i data-lucide="pause"></i>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<i data-lucide="play"></i>';
            }
            lucide.createIcons(); // Atualizar ícone
        });

        // Inicialização
        renderChannels();
        
        // Carregar o primeiro canal automaticamente (opcional)
        if(channels[0].url) loadChannel(channels[0]);

    </script>
</body>
</html>
