<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player - Duadazim</title>
    <!-- HLS.js para rodar os streams -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #e50914;
            /* Cor estilo Netflix */
            --dark: #141414;
            --light: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .login-box {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Layout Principal */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar de Categorias */
        aside {
            width: 250px;
            background-color: #1f1f1f;
            overflow-y: auto;
            border-right: 1px solid #333;
        }

        .category-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
        }

        .category-item:hover,
        .category-item.active {
            background-color: var(--primary);
        }

        /* Área de Conteúdo */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .video-container {
            width: 100%;
            height: 60vh;
            background: black;
            margin-bottom: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 60vh;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .channel-card {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }

        .channel-card:hover {
            transform: scale(1.05);
            background: #3a3a3a;
        }

        .status-msg {
            color: #aaa;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Tela de Login -->
    <div id="login-screen">
        <div class="login-box">
            <h2>IPTV Player</h2>
            <input type="text" id="url" value="http://sv22.link" placeholder="URL do Servidor">
            <input type="text" id="user" value="Duadazim" placeholder="Usuário">
            <input type="password" id="pass" value="18243853090" placeholder="Senha">
            <button onclick="connect()">Conectar</button>
            <p class="status-msg" id="login-status"></p>
        </div>
    </div>

    <!-- App Principal -->
    <div id="app-container" style="display: none;">
        <aside id="categories-list">
            <!-- Categorias serão carregadas aqui -->
        </aside>

        <main>
            <h2 id="current-category-title">Canais</h2>

            <div class="video-container">
                <video id="player" controls></video>
            </div>

            <div id="channels-list" class="channel-grid">
                <!-- Canais serão carregados aqui -->
            </div>
        </main>
    </div>

    <script>
        // Configurações Iniciais
        let serverUrl = '';
        let username = '';
        let password = '';

        // Elementos DOM
        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const statusMsg = document.getElementById('login-status');
        const categoriesList = document.getElementById('categories-list');
        const channelsList = document.getElementById('channels-list');
        const playerTitle = document.getElementById('current-category-title');
        const videoPlayer = document.getElementById('player');

        // Função de Conexão
        async function connect() {
            serverUrl = document.getElementById('url').value.replace(/\/$/, ""); // Remove barra final se existir
            username = document.getElementById('user').value;
            password = document.getElementById('pass').value;

            if (!serverUrl || !username || !password) {
                statusMsg.innerText = "Preencha todos os campos!";
                return;
            }

            statusMsg.innerText = "Conectando...";

            try {
                // 1. Testar conexão básica (Get Server Info)
                const response = await fetch(`${serverUrl}/player_api.php?username=${username}&password=${password}`);

                if (response.ok) {
                    loginScreen.style.display = 'none';
                    appContainer.style.display = 'flex';
                    statusMsg.innerText = "Conectado! Carregando categorias...";

                    // Carregar Categorias de TV ao vivo
                    loadCategories('live');
                } else {
                    throw new Error("Credenciais inválidas ou servidor offline");
                }

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Erro: " + error.message;
            }
        }

        // Carregar Categorias
        async function loadCategories(type) {
            categoriesList.innerHTML = '';

            const endpoint = type === 'live'
                ? `${serverUrl}/player_api.php?username=${username}&password=${password}&action=get_live_streams`
                : `${serverUrl}/player_api.php?username=${username}&password=${password}&action=get_vod_streams`;

            try {
                const response = await fetch(endpoint);
                const data = await response.json();

                // Agrupar por categoria
                const categories = {};

                if (type === 'live') {
                    Object.keys(data).forEach(key => {
                        const catId = data[key].category_id;
                        if (!categories[catId]) categories[catId] = [];
                        categories[catId].push(data[key]);
                    });

                    // Adicionar botão "Todos"
                    addCategoryBtn("Todos", 'all');

                    Object.keys(categories).forEach(catId => {
                        const catName = data[categories[catId][0]].category_name;
                        addCategoryBtn(catName, catId);
                    });

                } else if (type === 'vod') {
                    // Lógica similar para filmes (simplificada)
                    Object.keys(data).forEach(key => {
                        const catId = data[key].category_id;
                        if (!categories[catId]) categories[catId] = [];
                        categories[catId].push(data[key]);
                    });

                    addCategoryBtn("Filmes", 'all_vod'); // Botão genérico para filmes

                    Object.keys(categories).forEach(catId => {
                        const catName = data[categories[catId][0]].category_name;
                        if (catName !== "All") { // Filtra categorias padrão do servidor
                            addCategoryBtn(catName, catId);
                        }
                    });
                }

            } catch (error) {
                console.error("Erro ao carregar:", error);
            }
        }

        function addCategoryBtn(name, id) {
            const div = document.createElement('div');
            div.className = 'category-item';
            div.innerText = name;
            div.onclick = () => loadChannels(id, name);
            categoriesList.appendChild(div);
        }

        // Carregar Canais/Streams
        async function loadChannels(catId, catName) {
            playerTitle.innerText = catName;
            channelsList.innerHTML = '';

            let endpoint = `${serverUrl}/player_api.php?username=${username}&password=${password}`;

            if (catId === 'all') {
                endpoint += '&action=get_live_streams';
            } else {
                endpoint += `&category_id=${catId}&action=get_live_streams`;
            }

            try {
                const response = await fetch(endpoint);
                const data = await response.json();

                // Ordenar por nome
                data.sort((a, b) => a.name.localeCompare(b.name));

                data.forEach(channel => {
                    const card = document.createElement('div');
                    card.className = 'channel-card';

                    // Ícone simples baseado no ID ou texto
                    let icon = channel.stream_icon ? `<img src="${serverUrl}/${channel.stream_icon}" style="width:50px; height:50px; object-fit:contain;">` : '';

                    card.innerHTML = `
                        ${icon}
                        <h4>${channel.name}</h4>
                    `;

                    card.onclick = () => playStream(channel.stream_id, channel.name);
                    channelsList.appendChild(card);
                });

            } catch (error) {
                console.error(error);
            }
        }

        // Tocar Stream
        function playStream(streamId, name) {
            playerTitle.innerText = `Tocando: ${name}`;

            const streamUrl = `${serverUrl}/live/${username}/${password}/${streamId}.m3u8`;

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    videoPlayer.play();
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Suporte nativo (Safari)
                videoPlayer.src = streamUrl;
                videoPlayer.addEventListener('loadedmetadata', function () {
                    videoPlayer.play();
                });
            }
        }

    </script>
</body>

</html>
