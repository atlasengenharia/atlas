<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>Cloun Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.95);
      color: white;
      text-align: center;
      padding: 24px;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .error-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #ef4444; }
    .error-message { font-size: 14px; color: #a0a0a0; max-width: 500px; word-break: break-word; margin-bottom: 16px; line-height: 1.5; }
    .loading {
      width: 60px; height: 60px;
      border: 4px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading.hidden { display: none; }
    .channel-info {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.7);
      padding: 12px 16px;
      border-radius: 8px;
      z-index: 20;
    }
    .channel-name { font-size: 14px; font-weight: 600; }
    .live-badge { font-size: 10px; font-weight: 600; color: #e94560; text-transform: uppercase; }
    .controls {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 20;
    }
    body:hover .controls { opacity: 1; }
    .btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { background: rgba(255,255,255,0.3); }
    .btn-vlc { background: #ff7b00; }
    .btn-vlc:hover { background: #ff8c1a; }
    .btn-accent { background: #e94560; }
    .btn-accent:hover { background: #ff6b6b; }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading"></div>
  <div id="error" class="overlay hidden">
    <div class="error-title">Playback Error</div>
    <div id="error-message" class="error-message"></div>
    <div style="display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; justify-content: center;">
      <button class="btn btn-vlc" id="btn-vlc">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Open in VLC (Recommended)
      </button>
      <button class="btn btn-accent" id="btn-retry">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Retry
      </button>
    </div>
  </div>
  <div id="channel-info" class="channel-info" style="display: none;">
    <div>
      <div id="channel-name" class="channel-name"></div>
      <div class="live-badge">LIVE</div>
    </div>
  </div>
  <video id="video" autoplay playsinline></video>
  <div class="controls">
    <button class="btn btn-vlc" id="btn-vlc-ctrl">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      VLC
    </button>
    <button class="btn" id="btn-fullscreen">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
      Fullscreen
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <script>
    (function() {
      const video = document.getElementById('video');
      const loading = document.getElementById('loading');
      const errorOverlay = document.getElementById('error');
      const errorMessage = document.getElementById('error-message');
      const channelInfo = document.getElementById('channel-info');
      const channelNameEl = document.getElementById('channel-name');
      const btnRetry = document.getElementById('btn-retry');
      const btnVlc = document.getElementById('btn-vlc');
      const btnVlcCtrl = document.getElementById('btn-vlc-ctrl');
      const btnFullscreen = document.getElementById('btn-fullscreen');

      let hlsInstance = null;
      let currentUrl = null;
      let retryCount = 0;
      const maxRetries = 3;

      function showError(msg) {
        loading.classList.add('hidden');
        errorOverlay.classList.remove('hidden');
        errorMessage.textContent = msg;
      }

      function hideError() {
        errorOverlay.classList.add('hidden');
      }

      function hideLoading() {
        loading.classList.add('hidden');
      }

      function showLoading() {
        loading.classList.remove('hidden');
      }

      function showChannelInfo(name) {
        channelNameEl.textContent = name;
        channelInfo.style.display = 'block';
      }

      function playStream(url) {
        currentUrl = url;
        hideError();
        showLoading();

        const isHls = url.includes('.m3u8') || url.includes('live/');

        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }

        if (isHls && typeof Hls !== 'undefined' && Hls.isSupported()) {
          hlsInstance = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
            backBufferLength: 30,
            maxBufferLength: 20,
            maxMaxBufferLength: 120,
            xhrSetup: (xhr) => {
              xhr.withCredentials = false;
            }
          });

          hlsInstance.loadSource(url);
          hlsInstance.attachMedia(video);

          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            console.log('[Player] Manifest loaded successfully');
            hideLoading();
            hideError();
            video.play().catch(e => console.error('Play error:', e));
          });

          hlsInstance.on(Hls.Events.ERROR, (event, data) => {
            console.error('[Player] HLS Error:', data.type, data.details, data.response);
            if (data.fatal) {
              if (data.response?.status === 405) {
                showError('Server blocks direct access. Opening in VLC...');
                setTimeout(() => { if (currentUrl) window.location.href = 'vlc://' + currentUrl; }, 1500);
                return;
              }
              if (retryCount < maxRetries) {
                retryCount++;
                console.log(`[Player] Retrying... (${retryCount}/${maxRetries})`);
                setTimeout(() => playStream(url), 2000);
              } else {
                showError('Stream unavailable. Please use VLC player.\n\nVLC bypasses CORS and plays directly.');
              }
            }
          });

          video.addEventListener('playing', hideLoading);
          video.addEventListener('waiting', showLoading);
          video.addEventListener('canplay', hideLoading);

        } else if (isHls && video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
          video.addEventListener('loadedmetadata', () => {
            hideLoading();
            video.play().catch(console.error);
          });
        } else {
          video.src = url;
          video.addEventListener('loadedmetadata', () => {
            hideLoading();
            video.play().catch(console.error);
          });
          video.addEventListener('error', () => {
            console.error('[Player] Video error');
            if (retryCount < maxRetries) {
              retryCount++;
              setTimeout(() => playStream(url), 2000);
            } else {
              showError('Cannot play this stream. Please use VLC player.');
            }
          });
        }
      }

      function openVLC() {
        if (currentUrl) {
          window.location.href = 'vlc://' + currentUrl;
        }
      }

      const params = new URLSearchParams(window.location.search);
      const streamUrl = params.get('url');
      const name = params.get('name') || 'Channel';

      document.title = name;
      showChannelInfo(name);

      if (!streamUrl) {
        showError('No stream URL provided');
      } else {
        playStream(streamUrl);
      }

      btnVlc.addEventListener('click', openVLC);
      btnVlcCtrl.addEventListener('click', openVLC);

      btnRetry.addEventListener('click', () => {
        retryCount = 0;
        if (currentUrl) {
          playStream(currentUrl);
        }
      });

      btnFullscreen.addEventListener('click', () => {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          video.requestFullscreen();
        }
      });

      video.addEventListener('dblclick', () => {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          video.requestFullscreen();
        }
      });

      video.addEventListener('click', () => {
        if (video.paused) {
          video.play();
        } else {
          video.pause();
        }
      });
    })();
  </script>
</body>
</html>
